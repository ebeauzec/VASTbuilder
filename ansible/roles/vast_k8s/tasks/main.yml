---
# =============================================================================
# Role: vast_k8s — VAST CSI Driver for Kubernetes
# Generated by: VASTbuilder v2.0 (https://github.com/ebeauzec/VASTbuilder)
#
# Deploys the VAST CSI Driver using Helm and configures StorageClasses.
#
# SOURCES:
#   VAST CSI Driver GitHub: https://github.com/vast-data/vast-csi
#   VAST CSI Operator (OperatorHub): https://operatorhub.io/operator/vast-csi-operator
#   VAST Kubernetes Integration Guide: https://kb.vastdata.com/ → CSI Driver
#   Kubernetes CSI Spec: https://kubernetes-csi.github.io/docs/
#   Helm docs: https://helm.sh/docs/
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# PRE-REQUISITES
# ─────────────────────────────────────────────────────────────────────────────
- name: "Check kubectl available"
  ansible.builtin.command: kubectl version --client
  register: _kubectl_ver
  changed_when: false
  failed_when: _kubectl_ver.rc != 0

- name: "Check helm available"
  ansible.builtin.command: helm version --short
  register: _helm_ver
  changed_when: false
  failed_when: false

- name: "Install helm if missing"
  when: _helm_ver.rc != 0
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  changed_when: true

# ─────────────────────────────────────────────────────────────────────────────
# VAST CSI DRIVER INSTALLATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Add VAST CSI Helm repository"
  # Source: https://github.com/vast-data/vast-csi
  ansible.builtin.command: >
    helm repo add vast-csi https://vast-data.github.io/vast-csi/charts
  register: _helm_repo
  changed_when: "'already exists' not in _helm_repo.stdout"
  failed_when: false

- name: "Update Helm repositories"
  ansible.builtin.command: helm repo update
  changed_when: false

- name: "Create VAST storage namespace"
  ansible.builtin.command: >
    kubectl create namespace {{ vast_k8s_namespace }}
  register: _ns
  changed_when: "'created' in _ns.stdout"
  failed_when: _ns.rc != 0 and 'already exists' not in _ns.stderr

- name: "Create VAST CSI credentials secret"
  ansible.builtin.command: >
    kubectl create secret generic vast-credentials
      --namespace={{ vast_k8s_namespace }}
      --from-literal=username={{ vast_csi_username | default('admin') }}
      --from-literal=password={{ vast_csi_password | default('changeme') }}
  register: _secret
  changed_when: "'created' in _secret.stdout"
  failed_when: _secret.rc != 0 and 'already exists' not in _secret.stderr
  no_log: true

- name: "Install VAST CSI Driver via Helm"
  # VAST CSI Driver values:
  # Source: https://github.com/vast-data/vast-csi/blob/master/vast-csi/values.yaml
  ansible.builtin.command: >
    helm upgrade --install vast-csi vast-csi/vast-csi
      --namespace {{ vast_k8s_namespace }}
      --set vmsHost={{ vast_vip_start }}
      --set vmsPort=443
      --set sslVerify=false
      --set credentialsSecretName=vast-credentials
      --set mountOptions="nfsvers=4,nconnect=16,hard,timeo=600,retrans=2,rsize=1048576,wsize=1048576"
      --version {{ vast_csi_version | default('2.7.0') }}
      --wait
      --timeout 300s
  register: _helm_install
  changed_when: true

# ─────────────────────────────────────────────────────────────────────────────
# STORAGECLASS CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Deploy VAST StorageClass (RWX — default)"
  ansible.builtin.copy:
    dest: /tmp/vast-storageclass-rwx.yaml
    content: |
      # VAST Data StorageClass — ReadWriteMany (shared)
      # Source: VAST CSI Driver documentation
      # https://github.com/vast-data/vast-csi
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: {{ vast_k8s_storageclass }}
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
      provisioner: csi.vastdata.com
      parameters:
        nfsVersion: "4"
        vipPool: "{{ vast_cluster_name }}-vip-pool"
        viewPolicy: "{{ vast_cluster_name }}-nfs-policy"
        rootPath: "{{ vast_view_path }}"
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      mountOptions:
        - nfsvers=4.1
        - nconnect=16
        - hard
        - rsize=1048576
        - wsize=1048576
  changed_when: true

- name: "Apply StorageClass (RWX)"
  ansible.builtin.command: kubectl apply -f /tmp/vast-storageclass-rwx.yaml
  changed_when: true

- name: "Deploy VAST StorageClass (RWO — database/block)"
  ansible.builtin.copy:
    dest: /tmp/vast-storageclass-rwo.yaml
    content: |
      # VAST Data StorageClass — ReadWriteOnce (exclusive)
      # Used for databases, stateful sets, etc.
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: {{ vast_k8s_storageclass }}-rwo
      provisioner: csi.vastdata.com
      parameters:
        nfsVersion: "4"
        vipPool: "{{ vast_cluster_name }}-vip-pool"
        rootPath: "{{ vast_view_path }}/rwo"
      reclaimPolicy: Retain
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
  changed_when: true

- name: "Apply StorageClass (RWO)"
  ansible.builtin.command: kubectl apply -f /tmp/vast-storageclass-rwo.yaml
  changed_when: true

# ─────────────────────────────────────────────────────────────────────────────
# VERIFICATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Verify CSI pods are running"
  ansible.builtin.command: >
    kubectl get pods -n {{ vast_k8s_namespace }} -l app.kubernetes.io/name=vast-csi
  register: _csi_pods
  changed_when: false
  retries: 5
  delay: 15
  until: "'Running' in _csi_pods.stdout"

- name: "Create test PVC to verify provisioning"
  ansible.builtin.copy:
    dest: /tmp/vast-test-pvc.yaml
    content: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: vast-test-pvc
        namespace: {{ vast_k8s_namespace }}
      spec:
        accessModes:
          - ReadWriteMany
        storageClassName: {{ vast_k8s_storageclass }}
        resources:
          requests:
            storage: 100Gi
  changed_when: true

- name: "Apply test PVC"
  ansible.builtin.command: kubectl apply -f /tmp/vast-test-pvc.yaml
  changed_when: true

- name: "Verify test PVC bound (30s timeout)"
  ansible.builtin.command: >
    kubectl get pvc vast-test-pvc -n {{ vast_k8s_namespace }} -o jsonpath='{.status.phase}'
  register: _pvc_phase
  changed_when: false
  retries: 6
  delay: 5
  until: _pvc_phase.stdout == "Bound"

- name: "Display K8s integration status"
  ansible.builtin.debug:
    msg: |
      ============================================================
      VAST CSI Driver Deployment Complete
      ============================================================
      Namespace      : {{ vast_k8s_namespace }}
      StorageClass   : {{ vast_k8s_storageclass }} (RWX)
                       {{ vast_k8s_storageclass }}-rwo (RWO)
      CSI Pods       : {{ _csi_pods.stdout | default('N/A') }}
      Test PVC Phase : {{ _pvc_phase.stdout | default('N/A') }}
      
      To create a PVC, use:
        storageClassName: {{ vast_k8s_storageclass }}
      
      Documentation:
        https://github.com/vast-data/vast-csi
      ============================================================

- name: "Clean up test PVC"
  ansible.builtin.command: kubectl delete pvc vast-test-pvc -n {{ vast_k8s_namespace }}
  changed_when: true
  failed_when: false
