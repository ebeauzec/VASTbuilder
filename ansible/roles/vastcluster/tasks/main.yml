---
# =============================================================================
# Role: vastcluster — VAST Cluster Bootstrap & Configuration
# Generated by: VASTbuilder v2.0 (https://github.com/ebeauzec/VASTbuilder)
#
# Tasks executed on the Lead CNode (cnode-01) to bootstrap and configure
# the VAST cluster via VCLI.
#
# SOURCES:
#   VAST AI OS Admin Guide: https://kb.vastdata.com/
#   VCLI Reference: https://kb.vastdata.com/ → Administrator's Guide → CLI Reference
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# PRE-BOOTSTRAP VALIDATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Validate VCLI is accessible"
  ansible.builtin.command: vcli --version
  register: _vcli_ver
  changed_when: false
  failed_when: _vcli_ver.rc != 0

- name: "Print VCLI version"
  ansible.builtin.debug:
    msg: "VCLI version: {{ _vcli_ver.stdout }}"

- name: "Check all D-Nodes visible to cluster"
  ansible.builtin.command: vcli admin> node list --type dnode
  register: _dnode_list
  changed_when: false
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1: CLUSTER GLOBAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
- name: "1.1 — Set cluster hostname"
  ansible.builtin.command: >
    vcli admin> cluster modify
      --cluster-name {{ vast_cluster_name }}
  register: _set_hostname
  changed_when: "'modified' in _set_hostname.stdout | lower"
  failed_when: _set_hostname.rc != 0 and 'already' not in _set_hostname.stdout | lower

- name: "1.2 — Set DNS server"
  ansible.builtin.command: >
    vcli admin> cluster modify
      --dns1 {{ vast_dns_server }}
  changed_when: true
  failed_when: false

- name: "1.3 — Set NTP server"
  ansible.builtin.command: >
    vcli admin> cluster modify
      --ntp1 {{ vast_ntp_server }}
  changed_when: true
  failed_when: false

- name: "1.4 — Set syslog server"
  ansible.builtin.command: >
    vcli admin> cluster modify
      --syslog-server {{ vast_syslog_server }}
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2: VIP POOL CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "2.1 — Create VIP Pool"
  ansible.builtin.command: >
    vcli admin> vippool create
      --name "{{ vast_cluster_name }}-vip-pool"
      --start-ip {{ vast_vip_start }}
      --end-ip {{ vast_vip_end }}
      --subnet-prefix {{ vast_vip_mask }}
      --gw {{ vast_vip_gateway }}
      --role protocols
      --vlan {{ vast_frontend_vlan }}
  register: _vippool
  changed_when: "'created' in _vippool.stdout | lower"
  failed_when: _vippool.rc != 0 and 'already exists' not in _vippool.stdout | lower

- name: "2.2 — Apply VIP load-balance policy"
  ansible.builtin.command: >
    vcli admin> vippool modify
      --name "{{ vast_cluster_name }}-vip-pool"
      --lb-method {{ vast_vip_policy }}
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 3: PROTOCOL ENABLEMENT
# ─────────────────────────────────────────────────────────────────────────────
- name: "3.1 — Create NFS View Policy (v3 + v4.1)"
  when: vast_enable_nfs | bool
  ansible.builtin.command: >
    vcli admin> viewpolicy create
      --name "{{ vast_cluster_name }}-nfs-policy"
      --nfs-read-only No
      --nfs {{ vast_nfs_version }}
      --nfs-squash {{ vast_nfs_squash }}
      --nfs-all-squash No
  register: _nfspol
  changed_when: "'created' in _nfspol.stdout | lower"
  failed_when: _nfspol.rc != 0 and 'already exists' not in _nfspol.stdout | lower

- name: "3.2 — Enable SMB protocol"
  when: vast_enable_smb | bool
  ansible.builtin.command: >
    vcli admin> cluster modify
      --smb-enabled Yes
  changed_when: true
  failed_when: false

- name: "3.3 — Enable S3 protocol"
  when: vast_enable_s3 | bool
  ansible.builtin.command: >
    vcli admin> cluster modify
      --s3-enabled Yes
  changed_when: true
  failed_when: false

- name: "3.4 — Enable NVMe/TCP block storage"
  when: vast_enable_nvme | bool
  ansible.builtin.command: >
    vcli admin> cluster modify
      --nvme-enabled Yes
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 4: AUTHENTICATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "4.1 — Configure AD/LDAP authentication"
  when: vast_auth_source in ['ldap', 'kerberos']
  ansible.builtin.command: >
    vcli admin> activedirectory join
      --domain {{ vast_ad_domain }}
      --dc {{ vast_ad_server }}
      --username {{ vast_ad_user }}
      --password "{{ vast_ad_password }}"
  changed_when: true
  no_log: true

- name: "4.2 — Configure Kerberos (if selected)"
  when: vast_auth_source == 'kerberos'
  ansible.builtin.command: >
    vcli admin> cluster modify
      --krb5-enabled Yes
      --krb5-realm {{ vast_krb5_realm | default(vast_ad_domain | upper) }}
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 5: VIEWS & QUOTAS
# ─────────────────────────────────────────────────────────────────────────────
- name: "5.1 — Create default data view"
  ansible.builtin.command: >
    vcli admin> view create
      --name "{{ vast_cluster_name }}-data"
      --path {{ vast_view_path }}
      --create-dir Yes
      --policy-name "{{ vast_cluster_name }}-nfs-policy"
      --vip-pool-name "{{ vast_cluster_name }}-vip-pool"
  register: _view
  changed_when: "'created' in _view.stdout | lower"
  failed_when: _view.rc != 0 and 'already exists' not in _view.stdout | lower

- name: "5.2 — Set quota on data view ({{ vast_quota_tb }} TB)"
  when: vast_quota_tb is defined and vast_quota_tb > 0
  ansible.builtin.command: >
    vcli admin> view modify
      --name "{{ vast_cluster_name }}-data"
      --hard-quota {{ vast_quota_tb }}T
      --soft-quota {{ (vast_quota_tb * 0.9) | int }}T
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 6: DATA REDUCTION & ENCRYPTION
# ─────────────────────────────────────────────────────────────────────────────
- name: "6.1 — Enable DARE encryption (AES-256)"
  when: vast_enable_dare | bool
  ansible.builtin.command: >
    vcli admin> cluster modify
      --encryption-enabled Yes
  changed_when: true
  failed_when: false

- name: "6.2 — Configure external KMS (if KMIP)"
  when: vast_enable_dare | bool and vast_key_mgmt | default('built-in') == 'kmip'
  ansible.builtin.command: >
    vcli admin> kmip configure
      --server {{ vast_kmip_server }}
      --port {{ vast_kmip_port | default(5696) }}
      --cert {{ vast_kmip_cert }}
      --key {{ vast_kmip_key }}
  no_log: true
  changed_when: true

- name: "6.3 — Enable WORM (compliance mode)"
  when: vast_enable_worm | bool
  ansible.builtin.command: >
    vcli admin> view modify
      --name "{{ vast_cluster_name }}-data"
      --worm-enabled Yes
      --worm-minimum-retention {{ vast_worm_retention_days }}d
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 7: SNAPSHOT POLICIES
# ─────────────────────────────────────────────────────────────────────────────
- name: "7.1 — Create snapshot protection policy"
  ansible.builtin.command: >
    vcli admin> protectionpolicy create
      --name "{{ vast_cluster_name }}-snap-policy"
      --frame {{ vast_snapshot_schedule | replace('hourly', '1 hour') | replace('Every 4 Hours', '4 hours') | replace('daily', '1 day') | replace('weekly', '1 week') }}
      --keep-local {{ vast_snapshot_retention_days }}d
  register: _snappol
  changed_when: "'created' in _snappol.stdout | lower"
  failed_when: _snappol.rc != 0 and 'already exists' not in _snappol.stdout | lower

- name: "7.2 — Apply snapshot policy to data path"
  ansible.builtin.command: >
    vcli admin> protectedpath create
      --name "{{ vast_cluster_name }}-data-prot"
      --protection-policy-name "{{ vast_cluster_name }}-snap-policy"
      --source-dir {{ vast_view_path }}
  register: _protpath
  changed_when: "'created' in _protpath.stdout | lower"
  failed_when: _protpath.rc != 0 and 'already exists' not in _protpath.stdout | lower

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 8: REPLICATION (BC/DR)
# ─────────────────────────────────────────────────────────────────────────────
- name: "8.1 — Configure async mirror replication"
  when: vast_enable_replication | bool and vast_replication_type | default('async') == 'async'
  ansible.builtin.command: >
    vcli admin> remoteserver create
      --name "{{ vast_cluster_name }}-dr-site"
      --mgmt-ip {{ vast_remote_cluster_ip }}
      --access-key {{ vast_remote_access_key | default('') }}
  no_log: true
  changed_when: true
  failed_when: false

- name: "8.2 — Create replication protection policy"
  when: vast_enable_replication | bool
  ansible.builtin.command: >
    vcli admin> protectionpolicy create
      --name "{{ vast_cluster_name }}-replication-policy"
      --frame {{ vast_snapshot_schedule | replace('hourly', '1 hour') }}
      --keep-local 7d
      --keep-remote 30d
      --remote-server-name "{{ vast_cluster_name }}-dr-site"
      --remote-dir {{ vast_view_path }}
  changed_when: true
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 9: FINAL VALIDATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "9.1 — List all cluster components"
  ansible.builtin.command: vcli admin> cluster list
  register: _final_list
  changed_when: false

- name: "9.2 — Verify VIP pool active"
  ansible.builtin.command: vcli admin> vippool list
  register: _vip_status
  changed_when: false

- name: "9.3 — Verify view accessible"
  ansible.builtin.command: vcli admin> view list
  register: _view_status
  changed_when: false

- name: "9.4 — Display final cluster state"
  ansible.builtin.debug:
    msg: |
      ============================================================
      VAST CLUSTER CONFIGURATION COMPLETE
      ============================================================
      Cluster: {{ vast_cluster_name }}
      VIP Pool: {{ vast_vip_start }} → {{ vast_vip_end }} /{{ vast_vip_mask }}
      View: {{ vast_view_path }}
      Web UI: https://{{ ansible_host }}/ui
      
      Cluster Status:
      {{ _final_list.stdout | default('N/A') }}
      
      VIP Pool Status:
      {{ _vip_status.stdout | default('N/A') }}
      ============================================================
