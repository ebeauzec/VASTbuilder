---
# =============================================================================
# Role: vast_nfs_client — VAST NFS Client Configuration
# Generated by: VASTbuilder v2.0 (https://github.com/ebeauzec/VASTbuilder)
#
# Configures Linux NFS clients for VAST with performance-optimised mount options.
# Supports RHEL/CentOS/Rocky/AlmaLinux (dnf/yum) and Ubuntu/Debian (apt).
#
# Key NFS performance parameters (from VAST best-practices documentation):
#   - nconnect=8-16 : Multiple TCP connections per mount (kernel 5.3+ or RHEL 8.3+)
#   - rsize/wsize=1048576 : 1MB read/write buffers
#   - hard : Mandatory for data integrity (never use soft on storage)
#   - timeo=600 : 60-second NFS timeout before retry
#   - retrans=2 : Max 2 retries before reporting I/O error
#   - noresvport : Allows reconnection without reserved port (recommended for VAST)
#
# SOURCES:
#   VAST AI OS Admin Guide: https://kb.vastdata.com/ → Managing NFS
#   Red Hat NFS Guide: https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/managing_file_systems/mounting-nfs-shares_managing-file-systems
#   Linux Kernel NFS docs: https://www.kernel.org/doc/html/latest/filesystems/nfs/nfs.html
#   FIO docs: https://fio.readthedocs.io/en/latest/
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# OS DETECTION & PACKAGE INSTALLATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Install NFS client packages (RHEL/CentOS/Rocky)"
  ansible.builtin.dnf:
    name:
      - nfs-utils
      - nfs4-acl-tools
      - fio
      - iperf3
      - htop
    state: present
    update_cache: true
  when: ansible_os_family == "RedHat"
  tags: packages

- name: "Install NFS client packages (Debian/Ubuntu)"
  ansible.builtin.apt:
    name:
      - nfs-common
      - nfs4-acl-tools
      - fio
      - iperf3
      - htop
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags: packages

- name: "Enable and start NFS client services (RHEL)"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - rpcbind
    - nfs-client.target
  when: ansible_os_family == "RedHat"
  tags: services
  failed_when: false

# ─────────────────────────────────────────────────────────────────────────────
# KERNEL / SYSTEM PERFORMANCE TUNING
# ─────────────────────────────────────────────────────────────────────────────
- name: "Set NFS readahead to 4MB (VAST recommended)"
  # VAST documentation recommends 4096 * 512 = 2MB–4MB readahead
  # Source: VAST AI OS Client Optimisation Guide
  ansible.builtin.shell: |
    blockdev --setra 4096 /dev/$(lsblk -ndo name $(findmnt -n -o SOURCE {{ vast_mount_point }}) 2>/dev/null | head -1) 2>/dev/null || true
  changed_when: false
  failed_when: false
  tags: tuning

- name: "Configure kernel NFS buffer parameters"
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-vast-nfs.conf
  loop:
    - { name: 'vm.dirty_ratio', value: '20' }
    - { name: 'vm.dirty_background_ratio', value: '10' }
    - { name: 'net.core.rmem_max', value: '134217728' }
    - { name: 'net.core.wmem_max', value: '134217728' }
    - { name: 'net.core.netdev_max_backlog', value: '300000' }
    - { name: 'net.ipv4.tcp_rmem', value: '4096 87380 134217728' }
    - { name: 'net.ipv4.tcp_wmem', value: '4096 65536 134217728' }
    - { name: 'net.ipv4.tcp_congestion_control', value: 'bbr' }
    - { name: 'net.core.default_qdisc', value: 'fq' }
    - { name: 'net.ipv4.tcp_window_scaling', value: '1' }
  tags: tuning

- name: "Set IRQ balance affinity for VAST network interfaces"
  ansible.builtin.command: >
    systemctl restart irqbalance
  changed_when: true
  failed_when: false
  tags: tuning

# ─────────────────────────────────────────────────────────────────────────────
# MOUNT POINT CREATION & NFS MOUNTING
# ─────────────────────────────────────────────────────────────────────────────
- name: "Create NFS mount point directory"
  ansible.builtin.file:
    path: "{{ vast_mount_point }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: mount

- name: "Mount VAST NFSv3 share (high-throughput)"
  when: vast_nfs_version == 'v3' or vast_nfs_version == 'both' or vast_nfs_version == '3'
  ansible.posix.mount:
    path: "{{ vast_mount_point }}"
    src: "{{ vast_vip_start }}:{{ vast_view_path }}"
    fstype: nfs
    opts: "vers=3,proto=tcp,nconnect=8,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport"
    state: mounted
    boot: true
  tags: mount

- name: "Mount VAST NFSv4.1 share (secure/ACLs)"
  when: vast_nfs_version == 'v4.1' or vast_nfs_version == 'both' or vast_nfs_version == 'nfs4'
  ansible.posix.mount:
    path: "{{ vast_mount_point }}-nfs4"
    src: "{{ vast_vip_start }}:{{ vast_view_path }}"
    fstype: nfs
    opts: "vers=4.1,proto=tcp,nconnect=8,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport"
    state: mounted
    boot: true
  tags: mount

# ─────────────────────────────────────────────────────────────────────────────
# FIREWALL CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Open NFS traffic in firewalld (RHEL)"
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - nfs
    - rpc-bind
    - mountd
  when:
    - ansible_os_family == "RedHat"
    - ansible_service_mgr == "systemd"
  failed_when: false
  notify: reload firewalld
  tags: firewall

- name: "Open NFS ports via iptables (fallback)"
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
    comment: "VAST NFS client"
  loop:
    - '2049'
    - '111'
    - '20048'
  when: ansible_os_family == "Debian"
  tags: firewall

# ─────────────────────────────────────────────────────────────────────────────
# UDEV PERSISTENT READAHEAD RULE
# ─────────────────────────────────────────────────────────────────────────────
- name: "Create udev rule for persistent NFS readahead"
  ansible.builtin.copy:
    content: |
      # VAST NFS client readahead optimisation
      # Source: VAST AI OS Client Optimisation Guide
      # Sets 4MB readahead for all block devices
      SUBSYSTEM=="block", ACTION=="add|change", KERNEL=="sd*|nvme*", \
        RUN+="/sbin/blockdev --setra 4096 /dev/%k"
    dest: /etc/udev/rules.d/99-vast-readahead.rules
    mode: '0644'
  notify: reload udev
  tags: tuning

# ─────────────────────────────────────────────────────────────────────────────
# VERIFICATION
# ─────────────────────────────────────────────────────────────────────────────
- name: "Verify mount is accessible"
  ansible.builtin.command: "df -h {{ vast_mount_point }}"
  register: _df_result
  changed_when: false
  failed_when: "'{{ vast_mount_point }}' not in _df_result.stdout"

- name: "Quick I/O test (write 1GB)"
  ansible.builtin.command: >
    dd if=/dev/urandom of={{ vast_mount_point }}/vast-test-{{ inventory_hostname }}.bin
    bs=1M count=1024 oflag=direct
  register: _dd_result
  changed_when: true
  failed_when: false

- name: "Display mount and I/O test results"
  ansible.builtin.debug:
    msg: |
      Mount point   : {{ vast_mount_point }}
      DF result     : {{ _df_result.stdout | default('N/A') }}
      DD write test : {{ _dd_result.stderr | default('N/A') }}

handlers:
  - name: reload firewalld
    ansible.builtin.service:
      name: firewalld
      state: reloaded

  - name: reload udev
    ansible.builtin.command: udevadm control --reload-rules
    changed_when: true
