---
# =============================================================================
# VAST Enterprise Storage — Ansible Inventory Template
# Generated by: VASTbuilder v2.0 (https://github.com/ebeauzec/VASTbuilder)
# =============================================================================
# USAGE:
#   1. Replace all <PLACEHOLDER> values with your actual IP addresses
#   2. Run: ansible-playbook -i inventory.yml site.yml
#   3. For check mode: ansible-playbook -i inventory.yml site.yml --check
#
# SOURCES:
#   - Ansible Inventory Guide: https://docs.ansible.com/ansible/latest/inventory_guide/
#   - VAST AI OS Admin Guide: https://support.vastdata.com
# =============================================================================

all:
  vars:
    # -------------------------------------------------------------------------
    # Global SSH settings
    # -------------------------------------------------------------------------
    ansible_user: admin
    ansible_ssh_private_key_file: ~/.ssh/vast_deploy_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3

    # -------------------------------------------------------------------------
    # VAST Cluster Global Variables
    # -------------------------------------------------------------------------
    vast_cluster_name: "vast-cluster-01"
    vast_vip_start: "10.100.20.100"
    vast_vip_end: "10.100.20.119"
    vast_vip_mask: 24
    vast_vip_gateway: "10.100.20.1"
    vast_vip_policy: "round-robin"
    vast_view_path: "/data"
    vast_quota_tb: 100
    vast_nfs_version: "both"          # Options: v3, v4.1, both
    vast_nfs_squash: "no-squash"
    vast_auth_source: "local"         # Options: local, ldap, kerberos
    vast_dns_server: "10.100.20.10"
    vast_ntp_server: "10.100.20.11"
    vast_syslog_server: "10.100.20.12"
    vast_backend_vlan: 100
    vast_frontend_vlan: 20
    vast_mgmt_vlan: 10
    vast_mtu: 9000
    vast_fabric_type: "rocev2"        # Options: rocev2, infiniband
    vast_data_reduction_ratio: 3.0
    vast_enable_dare: true
    vast_enable_worm: false
    vast_worm_retention_days: 365
    vast_enable_s3: true
    vast_enable_smb: true
    vast_enable_nfs: true
    vast_enable_nvme: false
    vast_snapshot_schedule: "hourly"
    vast_snapshot_retention_days: 30
    vast_enable_replication: false
    vast_remote_cluster_ip: ""       # Set if replication is enabled

  children:

    # =========================================================================
    # VAST Cluster Nodes
    # =========================================================================
    vast_cluster:
      vars:
        ansible_port: 22
      children:

        # C-Nodes (Compute / CBox)
        cnodes:
          vars:
            vast_node_type: cnode
          hosts:
            cnode-01:
              ansible_host: 192.168.10.10
              vast_node_index: 1
              vast_backend_ip: 172.16.100.10
              vast_frontend_ip: 10.100.20.10
            cnode-02:
              ansible_host: 192.168.10.11
              vast_node_index: 2
              vast_backend_ip: 172.16.100.11
              vast_frontend_ip: 10.100.20.11
            cnode-03:
              ansible_host: 192.168.10.12
              vast_node_index: 3
              vast_backend_ip: 172.16.100.12
              vast_frontend_ip: 10.100.20.12
            cnode-04:
              ansible_host: 192.168.10.13
              vast_node_index: 4
              vast_backend_ip: 172.16.100.13
              vast_frontend_ip: 10.100.20.13

        # D-Nodes (Storage / Ceres DBox)
        dnodes:
          vars:
            vast_node_type: dnode
          hosts:
            dnode-01:
              ansible_host: 192.168.10.50
              vast_node_index: 1
              vast_backend_ip_a: 172.16.100.50   # D-Tray A → Switch A
              vast_backend_ip_b: 172.16.100.80   # D-Tray B → Switch B
            dnode-02:
              ansible_host: 192.168.10.51
              vast_node_index: 2
              vast_backend_ip_a: 172.16.100.51
              vast_backend_ip_b: 172.16.100.81

        # Backend Fabric Switches (for configuration)
        fabric_switches:
          vars:
            ansible_network_os: eos                # Arista EOS — change for other vendors
            ansible_connection: network_cli
          hosts:
            switch-a:
              ansible_host: 192.168.10.200
              switch_role: primary
            switch-b:
              ansible_host: 192.168.10.201
              switch_role: secondary

    # =========================================================================
    # Linux NFS Client Hosts
    # =========================================================================
    linux_nfs_clients:
      vars:
        vast_mount_proto: nfs
        vast_mount_version: "3"
        vast_nfs_opts: "vers=3,proto=tcp,nconnect=8,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2"
        vast_mount_point: /mnt/vast
      hosts:
        # Add your Linux NFS client hosts here
        # linux-client-01:
        #   ansible_host: 10.10.10.50

    # =========================================================================
    # GPU / AI Client Hosts (NFSv3 with GPUDirect)
    # =========================================================================
    gpu_clients:
      vars:
        vast_mount_proto: nfs
        vast_mount_version: "3"
        vast_nfs_opts: "vers=3,proto=tcp,nconnect=8,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,fsc"
        vast_mount_point: /mnt/vast-gpu
        vast_enable_gpudirect: true
      hosts:
        # Add your GPU cluster hosts here
        # gpu-node-01:
        #   ansible_host: 10.10.10.100

    # =========================================================================
    # Windows SMB Client Hosts
    # =========================================================================
    windows_smb_clients:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: kerberos        # or ntlm
        ansible_winrm_server_cert_validation: ignore
        vast_smb_drive_letter: "V"
        vast_smb_share: "\\\\{{ vast_vip_start }}\\{{ vast_view_path | replace('/', '') }}"
      hosts:
        # Add your Windows hosts here
        # win-client-01:
        #   ansible_host: 10.10.10.200
        #   ansible_user: DOMAIN\administrator

    # =========================================================================
    # Kubernetes Worker Nodes (for CSI driver deployment)
    # =========================================================================
    kubernetes_nodes:
      vars:
        vast_k8s_namespace: vast-storage
        vast_k8s_storageclass: vast-storageclass
        vast_k8s_access_mode: ReadWriteMany
        vast_csi_version: "2.7.0"
      hosts:
        # Add your Kubernetes worker nodes here
        # k8s-worker-01:
        #   ansible_host: 10.10.10.150
