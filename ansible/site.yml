---
# =============================================================================
# VAST Enterprise Storage — Master Playbook (site.yml)
# Generated by: VASTbuilder v2.0 (https://github.com/ebeauzec/VASTbuilder)
#
# PREREQUISITES:
#   ansible-galaxy collection install ansible.posix community.general
#
# USAGE:
#   Full deployment:
#     ansible-playbook -i inventory.yml site.yml
#   Specific tags only:
#     ansible-playbook -i inventory.yml site.yml --tags cluster
#     ansible-playbook -i inventory.yml site.yml --tags nfs_clients
#     ansible-playbook -i inventory.yml site.yml --tags k8s
#   Check mode (dry run):
#     ansible-playbook -i inventory.yml site.yml --check --diff
#
# SOURCES:
#   VAST AI OS Admin Guide: https://kb.vastdata.com/
#   Ansible POSIX Collection: https://docs.ansible.com/ansible/latest/collections/ansible/posix/
#   Ansible Community General: https://docs.ansible.com/ansible/latest/collections/community/general/
# =============================================================================

- name: "VAST Enterprise Deployment — Pre-flight Checks"
  hosts: all
  gather_facts: true
  become: false
  tags: [always, preflight]
  tasks:
    - name: Verify Ansible version
      ansible.builtin.assert:
        that: "ansible_version.full is version('2.15', '>=')"
        fail_msg: "Ansible 2.15+ required. Current: {{ ansible_version.full }}"
      run_once: true

    - name: Verify required collections installed
      ansible.builtin.command: ansible-galaxy collection list
      register: _collection_list
      run_once: true
      changed_when: false
      failed_when: false

    - name: Check ansible.posix available
      ansible.builtin.fail:
        msg: "Missing collection: ansible.posix — run: ansible-galaxy collection install ansible.posix"
      when: "'ansible.posix' not in _collection_list.stdout"
      run_once: true
      failed_when: false

    - name: Print deployment summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          VAST Enterprise Deployment Starting
          ============================================================
          Cluster Name    : {{ vast_cluster_name }}
          VIP Pool Start  : {{ vast_vip_start }}
          VIP Pool End    : {{ vast_vip_end }}
          NTP Server      : {{ vast_ntp_server }}
          DNS Server      : {{ vast_dns_server }}
          Fabric Type     : {{ vast_fabric_type | upper }}
          MTU             : {{ vast_mtu }}
          Protocols       : NFS={{ vast_enable_nfs }} SMB={{ vast_enable_smb }} S3={{ vast_enable_s3 }} NVMe={{ vast_enable_nvme }}
          DARE Encryption : {{ vast_enable_dare }}
          Replication     : {{ vast_enable_replication }}
          ============================================================
      run_once: true

# =============================================================================
# PHASE 1: Network Fabric Switch Configuration
# =============================================================================
- name: "Phase 1 — Configure Backend Fabric Switches"
  hosts: fabric_switches
  gather_facts: false
  tags: [switches, network]
  roles:
    - role: fabric_switch
  # Note: Requires ansible_network_os=eos and ansible_connection=network_cli (Arista)
  # For Cisco Nexus: ansible_network_os=nxos
  # For NVIDIA Spectrum: ansible_network_os=community.network.mlnxos

# =============================================================================
# PHASE 2: VAST Cluster Bootstrap & Configuration
# =============================================================================
- name: "Phase 2 — Bootstrap VAST Cluster"
  hosts: cnodes[0]  # Lead CNode only for initial bootstrap
  gather_facts: true
  become: true
  tags: [cluster, bootstrap]
  serial: 1
  roles:
    - role: vastcluster

# =============================================================================
# PHASE 3: Linux NFS Clients
# =============================================================================
- name: "Phase 3 — Configure Linux NFS Client Hosts"
  hosts: linux_nfs_clients
  gather_facts: true
  become: true
  tags: [nfs_clients, clients]
  roles:
    - role: vast_nfs_client

# =============================================================================
# PHASE 4: GPU / AI Cluster NFS Clients (with GPUDirect tuning)
# =============================================================================
- name: "Phase 4 — Configure GPU AI Client Hosts"
  hosts: gpu_clients
  gather_facts: true
  become: true
  tags: [gpu_clients, gpu, ai]
  roles:
    - role: vast_nfs_client
    - role: vast_gpu_client

# =============================================================================
# PHASE 5: Windows SMB Clients
# =============================================================================
- name: "Phase 5 — Configure Windows SMB Client Hosts"
  hosts: windows_smb_clients
  gather_facts: true
  tags: [smb_clients, windows, clients]
  roles:
    - role: vast_smb_client

# =============================================================================
# PHASE 6: Kubernetes CSI Driver Deployment
# =============================================================================
- name: "Phase 6 — Deploy VAST CSI Driver for Kubernetes"
  hosts: kubernetes_nodes[0]  # Run on control plane or first worker
  gather_facts: true
  become: true
  tags: [k8s, kubernetes, csi]
  roles:
    - role: vast_k8s

# =============================================================================
# PHASE 7: Monitoring & Alerting Setup
# =============================================================================
- name: "Phase 7 — Configure VAST Monitoring"
  hosts: cnodes[0]
  gather_facts: true
  become: true
  tags: [monitoring]
  tasks:
    - name: Configure SNMP community string
      ansible.builtin.shell: |
        vcli admin> cluster modify --snmp-community {{ vast_snmp_community | default('vastmonitor') }}
      changed_when: true

    - name: Set syslog destination
      ansible.builtin.shell: |
        vcli admin> cluster modify --syslog-server {{ vast_syslog_server }}
      changed_when: true

    - name: Verify cluster health post-deployment
      ansible.builtin.shell: vcli admin> cluster list
      register: _cluster_status
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: _cluster_status.stdout_lines

# =============================================================================
# PHASE 8: Acceptance Test Execution
# =============================================================================
- name: "Phase 8 — Run Acceptance Tests"
  hosts: linux_nfs_clients[0]  # Run FIO tests from first Linux client
  gather_facts: false
  become: true
  tags: [atp, tests, acceptance]
  tasks:
    - name: Install fio benchmark tool
      ansible.builtin.package:
        name: fio
        state: present

    - name: Run sequential read test (60 seconds)
      ansible.builtin.command: >
        fio --name=vast-seq-read
            --filename={{ vast_mount_point }}/fio-test-{{ inventory_hostname }}
            --size=20G --numjobs=16 --rw=read --bs=1M --direct=1
            --ioengine=libaio --iodepth=64 --group_reporting --runtime=60
            --output-format=json
      register: _fio_read
      changed_when: false
      failed_when: false

    - name: Run sequential write test (60 seconds)
      ansible.builtin.command: >
        fio --name=vast-seq-write
            --filename={{ vast_mount_point }}/fio-test-{{ inventory_hostname }}
            --size=20G --numjobs=16 --rw=write --bs=1M --direct=1
            --ioengine=libaio --iodepth=64 --group_reporting --runtime=60
            --output-format=json
      register: _fio_write
      changed_when: false
      failed_when: false

    - name: Run 4K random IOPS test (60 seconds)
      ansible.builtin.command: >
        fio --name=vast-rand-read
            --filename={{ vast_mount_point }}/fio-iops-{{ inventory_hostname }}
            --size=5G --numjobs=16 --rw=randread --bs=4k --direct=1
            --ioengine=libaio --iodepth=256 --group_reporting --runtime=60
            --output-format=json
      register: _fio_iops
      changed_when: false
      failed_when: false

    - name: Save ATP results
      ansible.builtin.copy:
        content: |
          VAST Acceptance Test Results
          ============================
          Date: {{ ansible_date_time.date }}
          Host: {{ inventory_hostname }}
          Mount: {{ vast_mount_point }}
          
          Sequential Read:
          {{ _fio_read.stdout | default('N/A') | truncate(500) }}
          
          Sequential Write:
          {{ _fio_write.stdout | default('N/A') | truncate(500) }}
          
          Random 4K IOPS:
          {{ _fio_iops.stdout | default('N/A') | truncate(500) }}
        dest: /tmp/vast-atp-results-{{ inventory_hostname }}.json
      changed_when: true

- name: "Deployment Complete — Post-Flight Summary"
  hosts: localhost
  gather_facts: false
  tags: [always, summary]
  tasks:
    - name: Print completion message
      ansible.builtin.debug:
        msg: |
          ============================================================
          VAST Enterprise Deployment COMPLETE
          ============================================================
          Review ATP results at: /tmp/vast-atp-results-*.json
          VAST Web UI: https://{{ hostvars[groups['cnodes'][0]]['ansible_host'] }}/ui
          ============================================================
